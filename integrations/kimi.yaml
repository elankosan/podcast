integration_id: "kimi_llm"
name: "Kimi LLM API"
protocol: "http"
config:
  url: "https://api.moonshot.cn/v1"
  timeout: 120
  models:
    - "kimi-k2-0711"
    - "moonshot-v1-8k"
  max_tokens: 8192
  temperature: 0.7
  # API key is injected from environment variable KIMI_API_KEY at runtime
  # Do NOT hardcode credentials in this file
