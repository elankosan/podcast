name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  KIMI_API_KEY: sk-dummy-ci-key
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/podcast_test
  REDIS_URL: redis://localhost:6379/1
  NEO4J_URI: bolt://localhost:7687
  NEO4J_AUTH: neo4j/podcast_password
  SECRET_KEY: ci-secret-key-change-in-production
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: 30

jobs:
  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: podcast_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/podcast_password
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r api/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 api/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run pytest
        run: |
          pytest tests/ -v --cov=api --cov-report=xml --cov-report=html -o junit_family=xunit2 --junitxml=junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/api

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            junit.xml

  test-frontend:
    name: Test Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run linter
        working-directory: app
        run: npm run lint

      - name: Build Next.js
        working-directory: app
        run: npm run build
